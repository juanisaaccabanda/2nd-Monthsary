<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Gallery</title>
    <style>
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 10px 10px 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transform: rotate(-1deg); }
        .card img { width: 100%; border-radius: 5px; }
        .card p { font-family: 'Dancing Script', cursive; font-size: 1.3rem; margin-top: 10px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
<style>
    :root { --primary: #ff4d6d; --secondary: #ffccd5; --bg: #fffcf9; --text: #594157; }
    body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    
    /* Navigation Bar */
    nav { background: white; padding: 20px; display: flex; justify-content: center; gap: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
    nav a { text-decoration: none; color: var(--text); font-weight: 500; transition: 0.3s; font-size: 1.1rem; }
    nav a:hover { color: var(--primary); }
    .active { color: var(--primary); border-bottom: 2px solid var(--primary); }

    section { padding: 60px 20px; max-width: 900px; margin: auto; text-align: center; }
    h1, h2 { font-family: 'Dancing Script', cursive; color: var(--primary); }
</style>
</head>
<body>
    <nav>
        <a href="index.html">Our Story</a>
        <a href="gallery.html" class="active">Gallery</a>
        <a href="game.html">The Surprise</a>
    </nav>

    <section>
        <h2>Captured Moments</h2>
        <div class="grid">
            <div class="card"><img src="https://via.placeholder.com/300x400" alt="Us"><p>Our First Date</p></div>
            <div class="card" style="transform:rotate(2deg)"><img src="https://via.placeholder.com/300x400" alt="Us"><p>That One Laugh</p></div>
            <div class="card"><img src="https://via.placeholder.com/300x400" alt="Us"><p>My Favorite View</p></div>
        </div>
    </section>
</body>
</html>
